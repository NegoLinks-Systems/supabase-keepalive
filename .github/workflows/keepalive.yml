name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - url: https://wmqkbwcholvnbpnuqnzm.supabase.co
            key: sb_publishable_Rsa06E6MYWBjRHJu5i51LQ_XcyvOm_N

          - url: https://aovyugcxrrkjkzauoomb.supabase.co
            key: sb_publishable_MQIZYVhQiMHM88OREMBuUg_68kYZJRW

          - url: https://cdhykgvciawzfubalxdu.supabase.co
            key: sb_publishable_JBWzwZysYU4spCmAj257SQ_NZO8oTgM

          - url: https://epsygtwxjbqrxseerglh.supabase.co
            key: sb_publishable_dgR5sCUzfjfLiuvEgxjL0w_VosRuBkO

          - url: https://kcueevrfdkbvkgjpyzuo.supabase.co
            key: sb_publishable_m7h5UBxY2qu6myFnXM34bA_50__huq_

          - url: https://hoxkdprdovurlvfyzpdo.supabase.co
            key: sb_publishable_HZzuuGqWnWpfREcnLX7m5w_zuYQv-SE

    steps:
      - name: Wake ${{ matrix.project.url }}
        env:
          API_KEY: ${{ secrets[matrix.project.key] }}
          PROJECT_URL: ${{ matrix.project.url }}
        run: |
          echo "Pinging $PROJECT_URL"

          curl --silent --show-error --fail \
            --request GET \
            "$PROJECT_URL/rest/v1/" \
            --header "apikey: $API_KEY" \
            --header "Authorization: Bearer $API_KEY" \
            --header "Accept: application/json"

          echo ""
          echo "Success!"
