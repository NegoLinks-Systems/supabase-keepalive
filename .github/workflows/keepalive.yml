name: Keep Supabase Alive

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project:
          - url: https://wmqkbwcholvnbpnuqnzm.supabase.co
            key: SUPABASE_KEY_1

          - url: https://aovyugcxrrkjkzauoomb.supabase.co
            key: SUPABASE_KEY_2

          - url: https://kcueevrfdkbvkgjpyzuo.supabase.co
            key: SUPABASE_KEY_3

          - url: https://cdhykgvciawzfubalxdu.supabase.co
            key: SUPABASE_KEY_4

          - url: https://epsygtwxjbqrxseerglh.supabase.co
            key: SUPABASE_KEY_5

          - url: https://hoxkdprdovurlvfyzpdo.supabase.co
            key: SUPABASE_KEY_6

    steps:
      - name: Wake ${{ matrix.project.url }}
        env:
          API_KEY: ${{ secrets[matrix.project.key] }}
          PROJECT_URL: ${{ matrix.project.url }}
        run: |
          echo "Pinging $PROJECT_URL"

          curl --silent --show-error --fail \
            --request GET \
            "$PROJECT_URL/rest/v1/" \
            --header "apikey: $API_KEY" \
            --header "Authorization: Bearer $API_KEY" \
            --header "Accept: application/json"

          echo ""
          echo "Success!"
